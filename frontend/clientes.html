<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Oficina - Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Oficina Custom - Painel Admin</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="clientes.html" class="active">Clientes</a>
                <a href="veiculos.html">Veículos</a>
                <a href="servicos.html">Serviços</a>
                <a href="agendamentos.html">Agendamentos</a>
            </nav>
        </header>

        <main>
            <section class="card">
                <h2>Novo Cliente</h2>
                <form id="formCliente">
                    <div class="form-group">
                        <label for="nome">Nome Completo *</label>
                        <input type="text" id="nome" required placeholder="Ex: Romeu Silva">
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" placeholder="(48) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="nome@email.com">
                    </div>
                    <button type="submit" class="btn-salvar">Salvar Cliente</button>
                </form>
            </section>

            <section class="card">
                <h2>Clientes Cadastrados</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>E-mail</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaClientes">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/clientes.js"></script>
</body>
</html>
