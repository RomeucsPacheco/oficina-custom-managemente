<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Oficina - Agendamentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Oficina Custom - Painel Admin</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="clientes.html">Clientes</a>
                <a href="veiculos.html">Veículos</a>
                <a href="servicos.html">Serviços</a>
                <a href="agendamentos.html" class="active">Agendamentos</a>
            </nav>
        </header>

        <main>
            <section class="card">
                <h2>Nova Ordem / Agendamento</h2>
                <form id="formAgendamento">
                    <div class="form-group">
                        <label for="selectVeiculo">Veículo / Carro *</label>
                        <select id="selectVeiculo" required>
                            <option value="">Selecione um veículo...</option>
                            </select>
                    </div>
                    <div class="form-group">
                        <label for="selectServico">Serviço / Customização *</label>
                        <select id="selectServico" required>
                            <option value="">Selecione um serviço...</option>
                            </select>
                    </div>
                    <div class="form-group">
                        <label for="data">Data do Agendamento *</label>
                        <input type="date" id="data" required>
                    </div>
                    <div class="form-group">
                        <label for="status">Status Inicial *</label>
                        <select id="status" required>
                            <option value="Pendente">Pendente</option>
                            <option value="Em Andamento">Em Andamento</option>
                            <option value="Concluído">Concluído</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="observacoes">Observações do Projeto</label>
                        <textarea id="observacoes" rows="3" placeholder="Ex: Ajustar fiação do som, graves fortes..."></textarea>
                    </div>
                    <button type="submit" class="btn-salvar">Confirmar Agendamento</button>
                </form>
            </section>

            <section class="card">
                <h2>Projetos e Agendamentos</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Carro (Dono)</th>
                            <th>Serviço</th>
                            <th>Data</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAgendamentos">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/agendamentos.js"></script>
</body>
</html>
